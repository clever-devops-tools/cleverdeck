<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Redirigiendo…</title>
<script>
  (function() {
    var path = window.location.pathname;

    if (/^\/cleverdeck\/falabella\//.test(path)) {
      var slide = path.replace('/cleverdeck/falabella/', '').replace(/\/$/, '');
      if (slide) {
        sessionStorage.setItem('spa_redirect', '/cleverdeck/falabella/' + slide);
      }
      window.location.replace('/cleverdeck/falabella/');
    } else if (/^\/cleverdeck\/pacifico\//.test(path)) {
      var slide = path.replace('/cleverdeck/pacifico/', '').replace(/\/$/, '');
      if (slide) {
        sessionStorage.setItem('spa_redirect', '/cleverdeck/pacifico/' + slide);
      }
      window.location.replace('/cleverdeck/pacifico/');
    } else {
      window.location.replace('/cleverdeck/');
    }
  })();
</script>
</head>
<body></body>
</html>
